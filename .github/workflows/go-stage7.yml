name: CargoCore Stage 7 Verification

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: false

      - name: Verify source formatting
        run: |
          unformatted="$(find . -name '*.go' -print0 | xargs -0 gofmt -l)"
          if [ -n "$unformatted" ]; then
            echo "The following files require gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run unit tests
        run: go test ./...

      - name: Run static analysis
        run: go vet ./...

      - name: Run race detector
        run: go test -race ./...

  postgres-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cargoos
          POSTGRES_PASSWORD: cargoos
          POSTGRES_DB: cargoos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cargoos -d cargoos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://cargoos:cargoos@localhost:5432/cargoos?sslmode=disable
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Verify PostgreSQL client
        run: psql --version

      - name: Run PostgreSQL integration verification
        run: bash integration/postgres_schema_test.sh
