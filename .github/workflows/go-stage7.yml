name: CargoCore Stage 7 Verification

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: false

      - name: Format source
        run: gofmt -w evaluation third_party/google_uuid

      - name: Run unit tests
        run: go test ./...

      - name: Run static analysis
        run: go vet ./...

      - name: Run race detector
        run: go test -race ./...
